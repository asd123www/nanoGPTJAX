model:
  seqlen: 2048
  vocab_size: 50304
  d_emb: 1024
  mlp_hidden_dim: 3072
  num_layers: 6
  q_heads: 8
  kv_heads: 8
  attn_impl: xla    # "flash_attn" or "xla"
  activation_checkpointing: false
  dtype: bfloat16

hparams:
  # Schedule
  total_train_steps: 500
  warmup_steps: 150
  micro_batch_size: 8
  global_batch_size: 8

  # Optimizer
  max_lr: 6.0e-4
  min_lr: 6.0e-5
  embedding_lr: 0.2
  unembedding_lr: 0.004
  b1: 0.9
  b2: 0.95
  weight_decay: 0.01
  cautious_weight_decay: 0.0
  clip_grad_norm: 1.0

checkpoint:
  max_checkpoints_to_keep: 3
  checkpoint_save_steps: 1000
  last_checkpoint_step: 0
  save_ckpt_dir: "checkpoints/project1-part2"
  load_params_ckpt_path: "checkpoints/project1-part2/0/params"

profile:
  enabled: true
  profile_dir: "profiles/"
  start_step: 5
  end_step: 10

data_dir: "nanogpt/fineweb10B/"
