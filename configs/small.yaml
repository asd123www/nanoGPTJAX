# Small model configuration for quick experiments / debugging

model:
  seqlen: 512
  vocab_size: 50304
  d_emb: 384
  num_layers: 6
  q_heads: 6
  kv_heads: 3
  attn_type: gqa
  dtype: bfloat16

hparams:
  per_device_batch_size: 16
  desired_batch_size: 131072

  max_lr: 6.0e-4
  min_lr: 6.0e-5
  embedding_lr: 0.2
  unembedding_lr: 0.004
  other_peak_lr: 0.02
  b1: 0.8
  b2: 0.95
  weight_decay: 0.0
  cautious_weight_decay: 0.01
  grad_clip_norm: 1.0

  total_train_steps: 5000
  warmup_steps: 150

  init_lr_frac: 0.2
  final_lr_frac: 0.0

  es_patience: 300
  val_interval: 50

checkpoint:
  max_checkpoints_to_keep: 3
  checkpoint_save_steps: 200
  last_checkpoint_step: 0
  save_ckpt_dir: ""
  load_params_ckpt_path: ""

data_dir: "/home/zezhou/nanoGPTJAX/nanogpt/fineweb10B/"
