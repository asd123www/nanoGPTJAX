# Small model for single TPU v5e chip.

model:
  seqlen: 1024
  vocab_size: 50304
  d_emb: 768
  num_layers: 12
  q_heads: 8
  kv_heads: 1
  attn_impl: xla    # "flash_attn" or "xla"
  dtype: bfloat16

hparams:
  micro_batch_size: 16
  global_batch_size: 16

  total_train_steps: 5000
  warmup_steps: 150

  max_lr: 6.0e-4
  min_lr: 6.0e-5
  embedding_lr: 0.2
  unembedding_lr: 0.004
  b1: 0.8
  b2: 0.95
  weight_decay: 0.0
  cautious_weight_decay: 0.01
  grad_clip_norm: 1.0
  es_patience: 300
  val_interval: 50

checkpoint:
  max_checkpoints_to_keep: 3
  checkpoint_save_steps: 100
  last_checkpoint_step: 0
  save_ckpt_dir: "checkpoints/small"
  load_params_ckpt_path: "checkpoints/small/0/params"

profile:
  enabled: true
  profile_dir: "profiles/"
  start_step: 5
  end_step: 10

data_dir: "nanogpt/fineweb10B/"
