# Default configuration for nanoGPT-JAX
# This matches the hardcoded defaults in config.py

model:
  seqlen: 2048
  vocab_size: 50304
  d_emb: 768
  num_layers: 16
  q_heads: 8
  kv_heads: 4
  attn_impl: flash_attn    # "flash_attn" or "xla"
  dtype: bfloat16

hparams:
  # Schedule
  total_train_steps: 10000
  warmup_steps: 300
  micro_batch_size: 32
  global_batch_size: 256

  # Optimizer
  max_lr: 6.0e-4
  min_lr: 6.0e-5
  embedding_lr: 0.2
  unembedding_lr: 0.004
  b1: 0.8
  b2: 0.95
  weight_decay: 0.0
  cautious_weight_decay: 0.01
  clip_grad_norm: 1.0

checkpoint:
  max_checkpoints_to_keep: 5
  checkpoint_save_steps: 100
  last_checkpoint_step: 0
  save_ckpt_dir: ""
  load_params_ckpt_path: ""

profile:
  enabled: true
  profile_dir: "profiles/"
  start_step: 5          # skip first steps (compilation warmup)
  end_step: 10

data_dir: "nanogpt/fineweb10B/"
